<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mirror Controller</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#0a0a0a;
  color:#fff;
  font-family:'Helvetica Neue',Arial,sans-serif;
  min-height:100vh;
  padding:0 0 80px;
}

header {
  padding:24px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  gap:12px;
}
header h1 {
  font-size:1.1rem;
  font-weight:500;
  letter-spacing:0.05em;
}
header span {
  font-size:0.75rem;
  color:rgba(255,255,255,0.3);
}

.section {
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.section-title {
  font-size:0.7rem;
  letter-spacing:0.15em;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  margin-bottom:16px;
}

/* Module visibility toggles */
.module-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.module-row:last-child { border-bottom:none; }
.module-name { font-size:0.95rem; font-weight:400; }
.module-sub  { font-size:0.75rem; color:rgba(255,255,255,0.3); margin-top:2px; }

/* Toggle switch */
.toggle {
  position:relative;
  width:44px; height:26px; flex-shrink:0;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-track {
  position:absolute; inset:0;
  background:rgba(255,255,255,0.15);
  border-radius:13px;
  cursor:pointer;
  transition:background 0.3s;
}
.toggle input:checked + .toggle-track { background:#1DB954; }
.toggle-track::after {
  content:'';
  position:absolute;
  top:3px; left:3px;
  width:20px; height:20px;
  border-radius:50%;
  background:#fff;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.toggle input:checked + .toggle-track::after { transform:translateX(18px); }

/* Position grid */
.position-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}
.pos-btn {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  color:rgba(255,255,255,0.6);
  font-size:0.75rem;
  padding:10px 4px;
  cursor:pointer;
  text-align:center;
  transition:background 0.2s, border-color 0.2s, color 0.2s;
  line-height:1.3;
}
.pos-btn:active { background:rgba(255,255,255,0.15); }
.pos-btn.active {
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.4);
  color:#fff;
}
.pos-btn .icon { font-size:1.1rem; display:block; margin-bottom:3px; }

/* Module selector */
.module-select-wrap {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.module-chip {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  color:rgba(255,255,255,0.5);
  font-size:0.8rem;
  padding:6px 14px;
  cursor:pointer;
  transition:all 0.2s;
}
.module-chip.active {
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.4);
  color:#fff;
}

/* Inputs */
input[type=text] {
  width:100%;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  color:#fff;
  font-size:0.95rem;
  padding:12px 14px;
  outline:none;
  margin-bottom:10px;
  transition:border-color 0.2s;
}
input[type=text]:focus { border-color:rgba(255,255,255,0.4); }
input[type=text]::placeholder { color:rgba(255,255,255,0.25); }

/* Destination rows */
.dest-row {
  display:flex;
  gap:8px;
  margin-bottom:8px;
  align-items:center;
}
.dest-row input { margin-bottom:0; flex:1; }
.dest-row input:first-child { max-width:100px; }
.del-btn {
  background:none;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  color:rgba(255,255,255,0.4);
  font-size:1.1rem;
  width:38px; height:38px;
  cursor:pointer;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.del-btn:active { background:rgba(255,0,0,0.2); border-color:red; color:red; }

.add-btn {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  color:rgba(255,255,255,0.6);
  font-size:0.85rem;
  padding:10px;
  cursor:pointer;
  width:100%;
  text-align:center;
  margin-top:4px;
  transition:all 0.2s;
}
.add-btn:active { background:rgba(255,255,255,0.15); }

/* Save bar */
#save-bar {
  position:fixed;
  bottom:0; left:0; right:0;
  background:#0a0a0a;
  border-top:1px solid rgba(255,255,255,0.08);
  padding:12px 20px;
  display:flex;
  gap:10px;
}
#save-btn {
  flex:1;
  background:#1DB954;
  border:none;
  border-radius:12px;
  color:#000;
  font-size:1rem;
  font-weight:600;
  padding:14px;
  cursor:pointer;
  transition:opacity 0.2s;
}
#save-btn:active { opacity:0.8; }
#save-status {
  font-size:0.8rem;
  color:rgba(255,255,255,0.35);
  display:flex;
  align-items:center;
  min-width:60px;
}

/* Mirror preview */
#preview {
  position:relative;
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  aspect-ratio:16/9;
  margin-bottom:16px;
  overflow:hidden;
}
.preview-mod {
  position:absolute;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:4px;
  font-size:0.45rem;
  color:rgba(255,255,255,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:2px;
  cursor:pointer;
  transition:background 0.2s, border-color 0.2s;
  line-height:1.2;
}
.preview-mod.selected {
  background:rgba(29,185,84,0.3);
  border-color:#1DB954;
  color:#fff;
}
.preview-mod.hidden-mod {
  opacity:0.2;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Mirror Controller</h1>
    <span>Changes sync to your mirror instantly</span>
  </div>
</header>

<!-- LOCATION & WEATHER -->
<div class="section">
  <div class="section-title">Location & Weather</div>
  <input type="text" id="location-input" placeholder="e.g. Mount Pleasant, MI" />
</div>

<!-- COMMUTE DESTINATIONS -->
<div class="section">
  <div class="section-title">Commute Destinations</div>
  <div id="dest-list"></div>
  <button class="add-btn" id="add-dest">+ Add destination</button>
</div>

<!-- MODULE VISIBILITY -->
<div class="section">
  <div class="section-title">Modules</div>
  <div id="module-toggles"></div>
</div>

<!-- LAYOUT -->
<div class="section">
  <div class="section-title">Layout</div>
  <div id="preview">
    <div class="preview-mod" id="pv-mod-clock"    style="top:4%;right:3%;width:18%;height:16%">Clock</div>
    <div class="preview-mod" id="pv-mod-weather"  style="top:4%;left:3%;width:16%;height:16%">Weather</div>
    <div class="preview-mod" id="pv-mod-lyrics"   style="top:30%;left:20%;width:60%;height:40%">Lyrics</div>
    <div class="preview-mod" id="pv-mod-spotify"  style="bottom:4%;left:3%;width:30%;height:18%">Spotify</div>
    <div class="preview-mod" id="pv-mod-commute"  style="bottom:4%;right:3%;width:22%;height:22%">Commute</div>
    <div class="preview-mod" id="pv-mod-qr"       style="bottom:4%;left:38%;width:8%;height:14%">QR</div>
  </div>
  <p style="font-size:0.75rem;color:rgba(255,255,255,0.3);margin-bottom:12px">Tap a module to select it, then choose its position</p>
  <div class="position-grid" id="pos-grid">
    <button class="pos-btn" data-pos="top-left">    <span class="icon">↖</span>Top Left</button>
    <button class="pos-btn" data-pos="top-center">  <span class="icon">↑</span>Top Center</button>
    <button class="pos-btn" data-pos="top-right">   <span class="icon">↗</span>Top Right</button>
    <button class="pos-btn" data-pos="mid-left">    <span class="icon">←</span>Mid Left</button>
    <button class="pos-btn" data-pos="center">      <span class="icon">◎</span>Center</button>
    <button class="pos-btn" data-pos="mid-right">   <span class="icon">→</span>Mid Right</button>
    <button class="pos-btn" data-pos="bottom-left"> <span class="icon">↙</span>Bot Left</button>
    <button class="pos-btn" data-pos="bottom-center"><span class="icon">↓</span>Bot Center</button>
    <button class="pos-btn" data-pos="bottom-right"><span class="icon">↘</span>Bot Right</button>
  </div>
</div>

<div id="save-bar">
  <button id="save-btn">Save & Sync to Mirror</button>
  <div id="save-status"></div>
</div>

<script>
const MODULES = [
  {id:'mod-clock',   label:'Clock',   sub:'Time & date'},
  {id:'mod-weather', label:'Weather', sub:'Current conditions'},
  {id:'mod-lyrics',  label:'Lyrics',  sub:'Synced song lyrics'},
  {id:'mod-spotify', label:'Spotify', sub:'Now playing + progress'},
  {id:'mod-commute', label:'Commute', sub:'Drive time to destinations'},
  {id:'mod-qr',      label:'QR Code', sub:'Link to this controller'},
];

const POS_MAP = {
  'top-left':      {top:'40px',   left:'52px',  bottom:'',     right:'',    transform:''},
  'top-center':    {top:'40px',   left:'50%',   bottom:'',     right:'',    transform:'translateX(-50%)'},
  'top-right':     {top:'40px',   right:'52px', bottom:'',     left:'',     transform:''},
  'mid-left':      {top:'50%',    left:'52px',  bottom:'',     right:'',    transform:'translateY(-50%)'},
  'center':        {top:'50%',    left:'50%',   bottom:'',     right:'',    transform:'translate(-50%,-50%)'},
  'mid-right':     {top:'50%',    right:'52px', bottom:'',     left:'',     transform:'translateY(-50%)'},
  'bottom-left':   {bottom:'48px',left:'52px',  top:'',        right:'',    transform:''},
  'bottom-center': {bottom:'48px',left:'50%',   top:'',        right:'',    transform:'translateX(-50%)'},
  'bottom-right':  {bottom:'48px',right:'52px', top:'',        left:'',     transform:''},
};

// State
let state = {
  location: '',
  destinations: [],
  modules: {},  // id -> { hidden, pos }
};

// Load saved state
try {
  const s = localStorage.getItem('mirror_settings');
  if (s) { const p = JSON.parse(s); state.location = p.location||''; state.destinations = p.destinations||[]; }
  const l = localStorage.getItem('mirror_layout');
  if (l) {
    const layout = JSON.parse(l);
    for (const id of Object.keys(layout)) {
      state.modules[id] = {
        hidden: !!layout[id].hidden,
        pos: layout[id]._pos || 'top-right',
      };
    }
  }
} catch {}

// Default module positions
const DEFAULT_POS = {
  'mod-clock':'top-right','mod-weather':'top-left','mod-lyrics':'center',
  'mod-spotify':'bottom-left','mod-commute':'bottom-right','mod-qr':'bottom-center',
};
for (const m of MODULES) {
  if (!state.modules[m.id]) state.modules[m.id] = {hidden:false, pos:DEFAULT_POS[m.id]||'center'};
}

// ── Location input ────────────────────────────────────────────────
document.getElementById('location-input').value = state.location;
document.getElementById('location-input').addEventListener('input', e => {
  state.location = e.target.value;
});

// ── Destinations ──────────────────────────────────────────────────
function renderDests() {
  const list = document.getElementById('dest-list');
  list.innerHTML = '';
  state.destinations.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'dest-row';
    row.innerHTML = `
      <input type="text" placeholder="Label" value="${d.label||''}" data-i="${i}" data-field="label" />
      <input type="text" placeholder="Address or place name" value="${d.address||''}" data-i="${i}" data-field="address" />
      <button class="del-btn" data-i="${i}">×</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = parseInt(e.target.dataset.i);
      const f = e.target.dataset.field;
      state.destinations[i][f] = e.target.value;
    });
  });
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      state.destinations.splice(parseInt(e.target.dataset.i), 1);
      renderDests();
    });
  });
}
renderDests();
document.getElementById('add-dest').addEventListener('click', () => {
  state.destinations.push({label:'', address:''});
  renderDests();
});

// ── Module toggles ────────────────────────────────────────────────
function renderToggles() {
  const wrap = document.getElementById('module-toggles');
  wrap.innerHTML = '';
  for (const m of MODULES) {
    const row = document.createElement('div');
    row.className = 'module-row';
    const checked = !state.modules[m.id]?.hidden;
    row.innerHTML = `
      <div>
        <div class="module-name">${m.label}</div>
        <div class="module-sub">${m.sub}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${checked?'checked':''} data-id="${m.id}" />
        <div class="toggle-track"></div>
      </label>
    `;
    wrap.appendChild(row);
  }
  wrap.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', e => {
      state.modules[e.target.dataset.id].hidden = !e.target.checked;
      updatePreview();
    });
  });
}
renderToggles();

// ── Layout preview ────────────────────────────────────────────────
let selectedModule = null;

function updatePreview() {
  for (const m of MODULES) {
    const el = document.getElementById('pv-'+m.id);
    if (!el) continue;
    el.classList.toggle('selected', selectedModule === m.id);
    el.classList.toggle('hidden-mod', !!state.modules[m.id]?.hidden);
  }
  document.querySelectorAll('.pos-btn').forEach(btn => {
    btn.classList.toggle('active',
      selectedModule && state.modules[selectedModule]?.pos === btn.dataset.pos);
  });
}

for (const m of MODULES) {
  const el = document.getElementById('pv-'+m.id);
  if (!el) continue;
  el.addEventListener('click', () => {
    selectedModule = (selectedModule === m.id) ? null : m.id;
    updatePreview();
  });
}

document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!selectedModule) return;
    state.modules[selectedModule].pos = btn.dataset.pos;
    updatePreview();
  });
});

updatePreview();

// ── Save ──────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', () => {
  // Build layout object
  const layout = {};
  for (const m of MODULES) {
    const mod = state.modules[m.id];
    const pos = POS_MAP[mod.pos] || POS_MAP['center'];
    layout[m.id] = { ...pos, hidden: mod.hidden, _pos: mod.pos };
  }
  // Build settings object
  const settings = {
    location: state.location,
    destinations: state.destinations.filter(d => d.address),
  };
  localStorage.setItem('mirror_layout',   JSON.stringify(layout));
  localStorage.setItem('mirror_settings', JSON.stringify(settings));

  const st = document.getElementById('save-status');
  st.textContent = '✓ Synced';
  setTimeout(() => st.textContent = '', 2000);
});
</script>
</body>
</html>
