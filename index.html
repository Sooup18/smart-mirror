<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Mirror</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  color:#fff;
  font-family:'Helvetica Neue',Arial,sans-serif;
  height:100vh;
  overflow:hidden;
  user-select:none;
}

/* ── AUTH ── */
#auth-screen {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  gap:24px;
  text-align:center;
  padding:40px;
}
#auth-screen h1 { font-size:2rem; font-weight:300; letter-spacing:0.1em; }
#auth-screen p  { font-size:1rem; color:rgba(255,255,255,0.5); max-width:480px; line-height:1.6; }
#auth-btn {
  background:#1DB954; color:#000; border:none; border-radius:50px;
  padding:16px 40px; font-size:1rem; font-weight:600; cursor:pointer;
  letter-spacing:0.05em; transition:opacity 0.2s;
}
#auth-btn:hover { opacity:0.85; }
#auth-status { font-size:0.85rem; color:rgba(255,255,255,0.4); min-height:1.2em; }

/* ── MIRROR ── */
#mirror-screen {
  display:none;
  position:relative;
  width:100vw;
  height:100vh;
}

/* ── MODULES ── */
.module {
  position:absolute;
  transition:top 0.5s cubic-bezier(0.4,0,0.2,1),
             left 0.5s cubic-bezier(0.4,0,0.2,1),
             opacity 0.5s ease;
}
.module.hidden { opacity:0; pointer-events:none; }

/* clock */
#mod-clock {
  top:40px; right:52px;
  font-size:3rem; font-weight:200;
  color:rgba(255,255,255,0.85);
  letter-spacing:0.05em;
  text-align:right;
  line-height:1;
}
#mod-clock .date {
  font-size:0.9rem;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.12em;
  margin-top:6px;
}

/* spotify */
#mod-spotify {
  bottom:48px; left:48px;
  width:420px;
}
#track-info {
  display:flex; align-items:center; gap:16px; margin-bottom:16px;
}
#album-art {
  width:64px; height:64px; border-radius:8px;
  object-fit:cover; opacity:0.9; flex-shrink:0;
  background:rgba(255,255,255,0.05);
  transition:opacity 0.4s ease;
}
#track-name   { font-size:1.2rem; font-weight:500; line-height:1.3; }
#track-artist { font-size:0.9rem; color:rgba(255,255,255,0.45); margin-top:3px; }
#progress-wrap {
  height:2px; background:rgba(255,255,255,0.12);
  border-radius:2px; overflow:hidden;
}
#progress-bar {
  height:100%; background:rgba(255,255,255,0.5);
  width:0%; transition:width 0.5s linear;
}

/* lyrics */
#mod-lyrics {
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:70vw;
  text-align:center;
}
.lyric-line {
  font-size:2rem;
  font-weight:400;
  line-height:1.6;
  color:rgba(255,255,255,0.15);
  opacity:0.4;
  transform:translateY(6px) scale(0.96);
  transition:
    color 0.7s cubic-bezier(0.4,0,0.2,1),
    font-size 0.7s cubic-bezier(0.4,0,0.2,1),
    opacity 0.7s cubic-bezier(0.4,0,0.2,1),
    transform 0.7s cubic-bezier(0.4,0,0.2,1);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  will-change:transform,opacity,color;
}
.lyric-line.active {
  color:rgba(255,255,255,1);
  font-size:2.5rem;
  opacity:1;
  transform:translateY(0) scale(1);
}
.lyric-line.near {
  color:rgba(255,255,255,0.4);
  opacity:0.7;
  transform:translateY(3px) scale(0.982);
}
#lyrics-status {
  font-size:1.1rem; font-weight:300;
  color:rgba(255,255,255,0.2);
  letter-spacing:0.08em;
}

/* weather */
#mod-weather {
  top:40px; left:52px;
  min-width:180px;
}
#weather-temp {
  font-size:3rem; font-weight:200;
  color:rgba(255,255,255,0.85);
  line-height:1;
}
#weather-desc {
  font-size:0.85rem;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.1em;
  margin-top:6px;
  text-transform:uppercase;
}
#weather-loc {
  font-size:0.75rem;
  color:rgba(255,255,255,0.2);
  margin-top:4px;
}

/* commute */
#mod-commute {
  bottom:48px; right:52px;
  min-width:200px;
  text-align:right;
}
.commute-item {
  margin-bottom:16px;
}
.commute-label {
  font-size:0.75rem;
  color:rgba(255,255,255,0.25);
  letter-spacing:0.12em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.commute-time {
  font-size:2rem;
  font-weight:200;
  color:rgba(255,255,255,0.8);
  line-height:1;
}
.commute-via {
  font-size:0.75rem;
  color:rgba(255,255,255,0.25);
  margin-top:3px;
}

/* QR */
#mod-qr {
  bottom:48px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  opacity:0.3;
  transition:opacity 0.3s;
}
#mod-qr:hover { opacity:0.7; }
#mod-qr #qr-canvas { width:120px; height:120px; }
#mod-qr #qr-canvas img { width:120px !important; height:120px !important; display:block; }
#mod-qr #qr-canvas canvas { width:120px !important; height:120px !important; }
#mod-qr span {
  font-size:0.65rem;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.1em;
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <h1>Smart Mirror</h1>
  <p>Connect your Spotify account to display real-time synced lyrics.</p>
  <button id="auth-btn">Connect Spotify</button>
  <div id="auth-status"></div>
</div>

<!-- MIRROR -->
<div id="mirror-screen">

  <div class="module" id="mod-clock">
    <div id="clock-time">--:--</div>
    <div class="date" id="clock-date"></div>
  </div>

  <div class="module" id="mod-weather">
    <div id="weather-temp">--°</div>
    <div id="weather-desc">Loading…</div>
    <div id="weather-loc"></div>
  </div>

  <div class="module" id="mod-lyrics">
    <div id="lyrics-status">Nothing playing</div>
  </div>

  <div class="module" id="mod-spotify">
    <div id="track-info">
      <img id="album-art" src="" alt="" />
      <div>
        <div id="track-name">—</div>
        <div id="track-artist">—</div>
      </div>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <div class="module" id="mod-commute">
    <div id="commute-destinations"></div>
  </div>

  <div class="module" id="mod-qr">
    <div id="qr-canvas"></div>
    <span>CUSTOMIZE</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────
const CLIENT_ID    = 'ab78c48471d74d01a97ba682056e54af';
const REDIRECT_URI = 'https://sooup18.github.io/smart-mirror';
const MAPS_KEY     = 'AIzaSyC7-lC45v-acgOO5EPPVLq65vNjSiRG-54';
const CONTROLLER   = 'https://sooup18.github.io/smart-mirror/controller.html';

// ── PKCE ─────────────────────────────────────────────────────────
function randomBytes(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return Array.from(a, b => b.toString(16).padStart(2,'0')).join('');
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function sha256(s) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
}
async function startAuth() {
  const v = randomBytes(64);
  const c = base64url(await sha256(v));
  sessionStorage.setItem('pkce_verifier', v);
  const p = new URLSearchParams({
    client_id:CLIENT_ID, response_type:'code', redirect_uri:REDIRECT_URI,
    scope:'user-read-playback-state user-read-currently-playing',
    code_challenge_method:'S256', code_challenge:c,
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + p;
}
async function exchangeCode(code) {
  const v = sessionStorage.getItem('pkce_verifier');
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type:'authorization_code', code,
      redirect_uri:REDIRECT_URI, client_id:CLIENT_ID, code_verifier:v,
    }),
  });
  const d = await r.json();
  if (d.access_token) {
    sessionStorage.setItem('access_token', d.access_token);
    sessionStorage.setItem('refresh_token', d.refresh_token);
    sessionStorage.setItem('token_expiry', Date.now() + d.expires_in*1000);
    history.replaceState({}, '', window.location.pathname);
    return true;
  }
  return false;
}
async function refreshToken() {
  const rt = sessionStorage.getItem('refresh_token');
  if (!rt) return false;
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      grant_type:'refresh_token', refresh_token:rt, client_id:CLIENT_ID,
    }),
  });
  const d = await r.json();
  if (d.access_token) {
    sessionStorage.setItem('access_token', d.access_token);
    sessionStorage.setItem('token_expiry', Date.now() + d.expires_in*1000);
    if (d.refresh_token) sessionStorage.setItem('refresh_token', d.refresh_token);
    return true;
  }
  return false;
}
async function getToken() {
  if (Date.now() > parseInt(sessionStorage.getItem('token_expiry')||0) - 30000)
    await refreshToken();
  return sessionStorage.getItem('access_token');
}

// ── Spotify ───────────────────────────────────────────────────────
async function getNowPlaying() {
  const token = await getToken();
  if (!token) return null;
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing',
    { headers:{Authorization:'Bearer '+token} });
  if (r.status===204||r.status===401||r.status===404) return null;
  if (!r.ok) return null;
  return r.json();
}

// ── Lyrics ────────────────────────────────────────────────────────
async function fetchLyrics(title, artist, album, durMs) {
  try {
    const r = await fetch('https://lrclib.net/api/get?' + new URLSearchParams({
      track_name:title, artist_name:artist, album_name:album,
      duration:Math.round(durMs/1000),
    }));
    if (!r.ok) return null;
    const d = await r.json();
    if (d.syncedLyrics) return parseLRC(d.syncedLyrics);
    if (d.plainLyrics)  return parsePlain(d.plainLyrics, durMs);
  } catch {}
  return null;
}
function parseLRC(lrc) {
  const lines = [];
  for (const line of lrc.split('\n')) {
    const m = line.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) {
      const ms = (parseInt(m[1])*60 + parseFloat(m[2]))*1000;
      const text = m[3].trim();
      if (text) lines.push({ms,text});
    }
  }
  return {synced:true, lines};
}
function parsePlain(plain, durMs) {
  const raw = plain.split('\n').map(t=>t.trim()).filter(Boolean);
  const step = durMs/(raw.length+1);
  return {synced:false, lines:raw.map((text,i)=>({ms:step*(i+1),text}))};
}

// ── Weather (Open-Meteo, free, no key) ───────────────────────────
async function geocode(location) {
  const r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(location)}&key=${MAPS_KEY}`);
  const d = await r.json();
  if (d.results?.[0]) {
    const loc = d.results[0].geometry.location;
    return {lat:loc.lat, lng:loc.lng, name:d.results[0].formatted_address};
  }
  return null;
}
async function fetchWeather(lat, lng) {
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weathercode&temperature_unit=fahrenheit&wind_speed_unit=mph`);
  const d = await r.json();
  return d.current;
}
function weatherDesc(code) {
  if (code===0) return 'Clear sky';
  if (code<=2)  return 'Partly cloudy';
  if (code===3) return 'Overcast';
  if (code<=9)  return 'Foggy';
  if (code<=19) return 'Drizzle';
  if (code<=29) return 'Rain';
  if (code<=39) return 'Snow';
  if (code<=49) return 'Freezing rain';
  if (code<=59) return 'Drizzle';
  if (code<=69) return 'Rain';
  if (code<=79) return 'Snow';
  if (code<=84) return 'Rain showers';
  if (code<=94) return 'Snow showers';
  return 'Thunderstorm';
}

// ── Commute (Google Directions) ───────────────────────────────────
async function fetchCommute(origin, destination) {
  const r = await fetch(`https://maps.googleapis.com/maps/api/directions/json?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&departure_time=now&key=${MAPS_KEY}`);
  const d = await r.json();
  if (d.routes?.[0]?.legs?.[0]) {
    const leg = d.routes[0].legs[0];
    return {
      duration: leg.duration_in_traffic?.text || leg.duration.text,
      via: d.routes[0].summary,
    };
  }
  return null;
}

// ── Clock ─────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

// ── JSONBin sync (cross-device) ───────────────────────────────────
// These get filled in after you set up the controller for the first time
const JSONBIN_KEY = '$2a$10$MIse8uXCihxIRyLhsyrpKemdnBt2gJl0tEKo0xKh4rC96NHaMD/XG'';  // paste your JSONBin Master Key here
const JSONBIN_ID  = '6a2f5648f5f4af5e29f27b26';   // paste your Bin ID here after first controller save

async function fetchConfig() {
  if (JSONBIN_KEY === 'YOUR_JSONBIN_KEY' || JSONBIN_ID === 'YOUR_JSONBIN_ID') return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function watchConfig() {
  const config = await fetchConfig();
  if (config) {
    const hash = JSON.stringify(config);
    if (hash !== lastConfigHash) {
      lastConfigHash = hash;
      if (config.layout)   applyLayout(config.layout);
      if (config.settings) await applySettings(config.settings);
    }
  }
  setTimeout(watchConfig, 5000);
}

// ── Layout ────────────────────────────────────────────────────────
const MODULE_IDS = ['mod-clock','mod-weather','mod-lyrics','mod-spotify','mod-commute','mod-qr'];

function applyLayout(layout) {
  for (const id of MODULE_IDS) {
    const el = document.getElementById(id);
    if (!el) continue;
    const cfg = layout[id];
    if (!cfg) continue;
    el.style.top       = cfg.top    || '';
    el.style.bottom    = cfg.bottom || '';
    el.style.left      = cfg.left   || '';
    el.style.right     = cfg.right  || '';
    el.style.transform = cfg.transform || '';
    if (cfg.hidden) el.classList.add('hidden');
    else            el.classList.remove('hidden');
  }
}

// ── Settings (location, destinations) ────────────────────────────
let weatherTimer = null;
let commuteTimer = null;
let lastLocation = '';
let lastDests    = [];
let lastConfigHash = '';

async function applySettings(settings) {
  if (!settings) return;

  // Weather
  if (settings.location && settings.location !== lastLocation) {
    lastLocation = settings.location;
    if (weatherTimer) clearInterval(weatherTimer);
    await updateWeather(settings.location);
    weatherTimer = setInterval(() => updateWeather(settings.location), 10*60*1000);
  }

  // Commute
  const dests = settings.destinations || [];
  const destsStr = JSON.stringify(dests);
  if (destsStr !== JSON.stringify(lastDests) && settings.location) {
    lastDests = dests;
    if (commuteTimer) clearInterval(commuteTimer);
    await updateCommute(settings.location, dests);
    commuteTimer = setInterval(() => updateCommute(settings.location, dests), 5*60*1000);
  }
}

async function updateWeather(location) {
  try {
    const geo = await geocode(location);
    if (!geo) return;
    const w = await fetchWeather(geo.lat, geo.lng);
    document.getElementById('weather-temp').textContent = Math.round(w.temperature_2m) + '°';
    document.getElementById('weather-desc').textContent = weatherDesc(w.weathercode);
    document.getElementById('weather-loc').textContent  = location;
  } catch {}
}

async function updateCommute(origin, destinations) {
  const el = document.getElementById('commute-destinations');
  el.innerHTML = '';
  for (const dest of destinations) {
    try {
      const info = await fetchCommute(origin, dest.address);
      if (!info) continue;
      const div = document.createElement('div');
      div.className = 'commute-item';
      div.innerHTML = `
        <div class="commute-label">${dest.label}</div>
        <div class="commute-time">${info.duration}</div>
        <div class="commute-via">via ${info.via}</div>
      `;
      el.appendChild(div);
    } catch {}
  }
}

// ── QR Code ───────────────────────────────────────────────────────
function buildQR() {
  const el = document.getElementById('qr-canvas');
  if (!el) return;
  el.innerHTML = '';
  try {
    new QRCode(el, {
      text: CONTROLLER,
      width: 120, height: 120,
      colorDark: '#ffffff', colorLight: '#000000',
      correctLevel: QRCode.CorrectLevel.L,
    });
  } catch(e) {
    el.style.cssText = 'font-size:8px;color:rgba(255,255,255,0.4);word-break:break-all;width:120px;line-height:1.3';
    el.textContent = CONTROLLER;
  }
}

// ── Lyric engine ──────────────────────────────────────────────────
const VISIBLE    = 7;
const ACTIVE_POS = 3;
let lineEls      = [];

function buildLineEls() {
  const wrap = document.getElementById('mod-lyrics');
  wrap.innerHTML = '';
  lineEls = [];
  for (let i = 0; i < VISIBLE; i++) {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    wrap.appendChild(el);
    lineEls.push(el);
  }
}

function renderAt(activeIdx, lines) {
  const start = activeIdx - ACTIVE_POS;
  for (let i = 0; i < VISIBLE; i++) {
    const li = start + i;
    const el = lineEls[i];
    el.textContent = (li>=0 && li<lines.length) ? lines[li].text : '';
    el.className = 'lyric-line';
    if (i===ACTIVE_POS) el.classList.add('active');
    else if (Math.abs(i-ACTIVE_POS)===1) el.classList.add('near');
  }
}

function findActiveIdx(ms, lines) {
  let idx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].ms <= ms) idx = i; else break;
  }
  return idx;
}

function setLyricStatus(msg) {
  const wrap = document.getElementById('mod-lyrics');
  wrap.innerHTML = `<div id="lyrics-status">${msg}</div>`;
  lineEls = [];
}

// ── Playback state ────────────────────────────────────────────────
let lastTrackId   = null;
let currentLyrics = null;
let lastActiveIdx = -1;
let progressMs    = 0;
let fetchedAt     = 0;
let durationMs    = 0;
let isPlaying     = false;

async function poll() {
  const data = await getNowPlaying();
  if (!data || !data.item) {
    setLyricStatus('Nothing playing');
    lastTrackId = null; currentLyrics = null;
    document.getElementById('track-name').textContent   = '—';
    document.getElementById('track-artist').textContent = '—';
    document.getElementById('album-art').src = '';
    document.getElementById('progress-bar').style.width = '0%';
    return;
  }
  const item = data.item;
  isPlaying  = data.is_playing;
  progressMs = data.progress_ms || 0;
  fetchedAt  = Date.now();
  durationMs = item.duration_ms || 0;

  if (item.id !== lastTrackId) {
    lastTrackId   = item.id;
    lastActiveIdx = -1;
    currentLyrics = null;
    document.getElementById('track-name').textContent   = item.name;
    document.getElementById('track-artist').textContent = item.artists.map(a=>a.name).join(', ');
    const img = item.album?.images?.[1] || item.album?.images?.[0];
    document.getElementById('album-art').src = img?.url || '';
    setLyricStatus('Loading lyrics…');
    currentLyrics = await fetchLyrics(item.name, item.artists[0]?.name||'', item.album?.name||'', durationMs);
    if (currentLyrics?.lines?.length) { buildLineEls(); lastActiveIdx = -1; }
    else setLyricStatus('No lyrics found');
  }
  updateProgress();
}

function updateProgress() {
  if (!durationMs) return;
  const elapsed   = isPlaying ? Date.now()-fetchedAt : 0;
  const estimated = Math.min(progressMs+elapsed, durationMs);
  document.getElementById('progress-bar').style.width = ((estimated/durationMs)*100).toFixed(2)+'%';
  if (currentLyrics?.lines?.length && lineEls.length) {
    const idx = findActiveIdx(estimated, currentLyrics.lines);
    if (idx !== lastActiveIdx) { lastActiveIdx = idx; renderAt(idx, currentLyrics.lines); }
  }
}

function tick() { updateProgress(); requestAnimationFrame(tick); }

// ── Boot ──────────────────────────────────────────────────────────
document.getElementById('auth-btn').addEventListener('click', startAuth);

async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  if (code) {
    document.getElementById('auth-status').textContent = 'Connecting to Spotify…';
    const ok = await exchangeCode(code);
    if (!ok) { document.getElementById('auth-status').textContent = 'Auth failed — try again.'; return; }
  }
  if (sessionStorage.getItem('access_token')) {
    document.getElementById('auth-screen').style.display  = 'none';
    document.getElementById('mirror-screen').style.display = 'block';
    buildQR();
    watchConfig();
    requestAnimationFrame(tick);
    await poll();
    setInterval(poll, 3000);
  }
}

boot();
</script>
</body>
</html>
